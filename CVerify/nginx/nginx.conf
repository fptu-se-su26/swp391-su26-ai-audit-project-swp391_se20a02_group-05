# ==============================================================================
# CVERIFY NGINX REVERSE PROXY + SSL TERMINATION
# ==============================================================================
# Requires: certbot/Let's Encrypt certificates at /etc/letsencrypt/live/$DOMAIN/
# See deploy/README.md for setup instructions.
# ==============================================================================

events {
    worker_connections 1024;
}

http {
    # Security headers applied to all responses
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Redirect all HTTP → HTTPS
    server {
        listen 80;
        server_name ${DOMAIN};
        return 301 https://$host$request_uri;
    }

    # Main HTTPS server
    server {
        listen 443 ssl http2;
        server_name ${DOMAIN};

        # --- SSL (Let's Encrypt via certbot) ---
        ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # HSTS (1 year, include subdomains)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # --- Upload size limit for evidence files ---
        client_max_body_size 50M;

        # --- API: proxy to ASP.NET Core ---
        location /api/ {
            proxy_pass         http://cverify-core:5000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # SSE (Server-Sent Events) — disable buffering
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 300s;
        }

        # --- Health & Swagger endpoints ---
        location ~ ^/(health|swagger) {
            proxy_pass         http://cverify-core:5000;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- Frontend: proxy to Next.js ---
        location / {
            proxy_pass         http://cverify-client:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host       $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
