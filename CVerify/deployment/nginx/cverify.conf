# ==============================================================================
# CVerify Production Nginx Config — cverify.com.vn + api.cverify.com.vn
# ==============================================================================
# Install at /etc/nginx/sites-available/cverify.conf on the VPS, then:
#   sudo ln -s /etc/nginx/sites-available/cverify.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Assumes: cverify-client on 127.0.0.1:3000, cverify-core on 127.0.0.1:5247
# (per docker-compose.yml host port mappings). Adjust if CORE_PORT/CLIENT_PORT
# were overridden in your .env.
#
# Two public hostnames, both already pointed at this VPS directly via
# P.A Vietnam's DNS (dnssec1/dnssec2.pavietnam.vn — DNSSEC enabled, no
# Cloudflare proxy in front):
#   - cverify.com.vn      -> cverify-client (Next.js frontend)
#   - api.cverify.com.vn  -> cverify-core   (ASP.NET Core API, full path incl.
#                                           the "/api" prefix passed through
#                                           unchanged, since every controller
#                                           route already includes it, e.g.
#                                           [Route("api/auth")])
#
# Get the cert with both names as SANs on one cert:
#   sudo certbot --nginx -d cverify.com.vn -d www.cverify.com.vn -d api.cverify.com.vn
# ==============================================================================

# Rate limiting zones — applied only to auth-sensitive/expensive endpoints,
# not globally (the app already has its own IP-partitioned rate limiter,
# see Program.cs — this is a coarse first line of defense in front of it,
# and matters once CODE_CHANGES_REQUIRED.md's ForwardedHeaders fix lands,
# since until then the app-level limiter can't distinguish real client IPs).
limit_req_zone $binary_remote_addr zone=cverify_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=cverify_auth:10m rate=5r/m;

upstream cverify_client_upstream {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream cverify_core_upstream {
    server 127.0.0.1:5247;
    keepalive 32;
}

# ------------------------------------------------------------------------------
# HTTP -> HTTPS redirect (no application traffic served on :80)
# ------------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name cverify.com.vn www.cverify.com.vn;

    # Required for Certbot HTTP-01 renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ------------------------------------------------------------------------------
# HTTPS — main server block
# ------------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name cverify.com.vn;

    ssl_certificate     /etc/letsencrypt/live/cverify.com.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cverify.com.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    # SSE responses must never be gzip-buffered (see SSE location blocks below,
    # which explicitly disable both gzip and proxy buffering for streaming paths)

    # ---- File upload size (CV attachments, repository evidence, cert images) ----
    client_max_body_size 25m;

    # ---- Common proxy headers (applied per-location below) ----
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # ==========================================================================
    # SignalR WebSocket hubs — must come before the general /api/ location so
    # the Upgrade/Connection headers are applied specifically to these paths.
    # ==========================================================================
    location /hubs/ {
        proxy_pass http://cverify_core_upstream;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;   # long-lived WebSocket connections
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # ==========================================================================
    # Server-Sent Events endpoints — Core's AiChat/CandidateAssessment/
    # HiringRequirement/Streaming/RepositoryAnalysis controllers, and Core's
    # own internal call to the AI service uses a 5-minute HttpClient timeout
    # (Program.cs:473), so the proxy read timeout here matches that.
    # ==========================================================================
    location ~ ^/api/(ai-chat|chat|candidate-assessment|hiring-requirement|streaming|repository-analysis)/.*stream {
        proxy_pass http://cverify_core_upstream;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }
    # NOTE: the exact route segments above were not individually re-verified
    # against every controller's [Route] attribute in this pass — confirm the
    # real paths with `grep -r "\[Route\|\[HttpGet\|\[HttpPost" CVerify.Core/Modules/**/Controllers`
    # and adjust this regex before relying on it. If in doubt, the broader
    # `/api/` block below already sets `proxy_read_timeout 300s` too, so a
    # stream route that doesn't match this regex will still not time out
    # early — it will just be gzip/buffered by default Nginx settings, which
    # can delay the first bytes of a stream reaching the browser.

    # ==========================================================================
    # REST API — ASP.NET Core backend
    # Kept here only as a backward-compatible fallback for anything still
    # calling cverify.com.vn/api/* directly; the frontend itself now targets
    # api.cverify.com.vn (see the dedicated server block below).
    #
    # proxy_pass has NO trailing "/" — every controller route already includes
    # the "api" segment (e.g. [Route("api/auth")] in AuthController.cs), so the
    # full request path must be forwarded unchanged. A trailing "/" here would
    # make Nginx strip the "/api/" prefix before proxying, which 404s every
    # route except the ones with more specific locations above/below.
    # ==========================================================================
    location /api/ {
        limit_req zone=cverify_general burst=20 nodelay;

        proxy_pass http://cverify_core_upstream;
        proxy_read_timeout 300s;   # matches Core's 5-minute AI HttpClient timeout
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Tighter limit on auth endpoints specifically (login/register/forgot-password)
    location ~ ^/api/(auth|account)/(login|register|forgot-password|reset-password) {
        limit_req zone=cverify_auth burst=5 nodelay;
        proxy_pass http://cverify_core_upstream;
        proxy_read_timeout 30s;
    }

    # ==========================================================================
    # Health check passthrough (useful for external uptime monitors)
    # ==========================================================================
    location = /api/health {
        proxy_pass http://cverify_core_upstream/health;
        access_log off;
    }

    # ==========================================================================
    # Frontend — Next.js standalone server
    # ==========================================================================
    location /_next/static/ {
        proxy_pass http://cverify_client_upstream;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        limit_req zone=cverify_general burst=40 nodelay;
        proxy_pass http://cverify_client_upstream;
        proxy_read_timeout 60s;
    }
}

# ------------------------------------------------------------------------------
# HTTP -> HTTPS redirect for the API subdomain (no application traffic on :80)
# ------------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.cverify.com.vn;

    # Required for Certbot HTTP-01 renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ------------------------------------------------------------------------------
# HTTPS — api.cverify.com.vn -> cverify-core (127.0.0.1:5247)
# ------------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.cverify.com.vn;

    # Same cert as the main server block as long as it was issued with
    # `-d cverify.com.vn -d www.cverify.com.vn -d api.cverify.com.vn` (one cert,
    # multiple SANs). If api.cverify.com.vn instead got its own certificate,
    # point these two lines at /etc/letsencrypt/live/api.cverify.com.vn/ instead.
    ssl_certificate     /etc/letsencrypt/live/cverify.com.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cverify.com.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ---- File upload size (CV attachments, repository evidence, cert images) ----
    client_max_body_size 25m;

    # ---- Common proxy headers ----
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # ==========================================================================
    # SignalR WebSocket hubs — must come before the general / location so the
    # Upgrade/Connection headers are applied specifically to these paths.
    # ==========================================================================
    location /hubs/ {
        proxy_pass http://cverify_core_upstream;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;   # long-lived WebSocket connections
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # ==========================================================================
    # Server-Sent Events endpoints — same rationale as the main server block's
    # SSE location: must not be gzip/proxy-buffered.
    # ==========================================================================
    location ~ ^/api/(ai-chat|chat|candidate-assessment|hiring-requirement|streaming|repository-analysis)/.*stream {
        proxy_pass http://cverify_core_upstream;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # Tighter limit on auth endpoints specifically (login/register/forgot-password)
    location ~ ^/api/(auth|account)/(login|register|forgot-password|reset-password) {
        limit_req zone=cverify_auth burst=5 nodelay;
        proxy_pass http://cverify_core_upstream;
        proxy_read_timeout 30s;
    }

    # ==========================================================================
    # Health check passthrough (useful for external uptime monitors)
    # ==========================================================================
    location = /health {
        proxy_pass http://cverify_core_upstream/health;
        access_log off;
    }

    # ==========================================================================
    # Everything else — proxy_pass has NO trailing "/" so the full request path
    # (including the "/api" prefix every controller route expects) is passed
    # through unchanged to cverify-core.
    # ==========================================================================
    location / {
        limit_req zone=cverify_general burst=20 nodelay;
        proxy_pass http://cverify_core_upstream;
        proxy_read_timeout 300s;   # matches Core's 5-minute AI HttpClient timeout
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
    }
}
