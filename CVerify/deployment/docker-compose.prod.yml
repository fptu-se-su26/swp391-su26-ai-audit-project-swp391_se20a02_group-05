# ==============================================================================
# CVERIFY PRODUCTION OVERRIDE
# ==============================================================================
# This is an OVERRIDE file. It does not replace the repository's root
# docker-compose.yml — it is meant to be run together with it:
#
#   docker compose -f docker-compose.yml -f deployment/docker-compose.prod.yml \
#     --env-file .env up -d --build
#
# It does NOT redefine networks, volumes, healthchecks, or depends_on — those
# are already correct in the base file (see REPOSITORY_AUDIT.md §3-6) and are
# left untouched here. This file only:
#   1. Fixes the CRITICAL/HIGH gaps found in CONFIG_VALIDATION.md (env var
#      name mismatch for the AI service, frontend build-time API URL, Redis
#      password wiring, client port exposure)
#   2. Right-sizes resource limits for the ACTUAL production VPS
#      (2 vCPU / 4 GB RAM / 80 GB NVMe — not the 4 vCPU/8GB the codebase's
#      own hardware doc recommends as "Staging/SWP391" tier)
#   3. Sets restart policy and log rotation explicitly for production
#
# Assumption (explicit, not verified against the live VPS): the frontend
# container was deployed from this same repository's docker-compose.yml. If
# it was deployed some other way, applying this file will change how it's
# managed going forward — confirm with `docker inspect cverify-client` first.
# ==============================================================================

services:
  # ----------------------------------------------------------------------------
  # PostgreSQL — right-sized for 4GB host; shared_buffers should be tuned inside
  # the container/postgresql.conf separately if you go that deep (out of scope
  # for a docker-compose override).
  # ----------------------------------------------------------------------------
  postgres:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 768M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------------------------
  # Redis — CONFIG_VALIDATION.md #4: REDIS_PASSWORD must be set in .env for this
  # to actually enforce auth (the base command already reads ${REDIS_PASSWORD});
  # nothing to change here besides resource limits.
  # ----------------------------------------------------------------------------
  redis:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 320M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------------------------
  # AI Service — CONFIG_VALIDATION.md #2 fix: map Core's AI_SERVICE_* variable
  # names onto the names CVerify.AI/app/core/config.py actually reads
  # (SHARED_SECRET / CLIENT_ID). Without this block, HMAC auth between Core and
  # AI silently fails.
  #
  # Memory limit is tighter than the codebase's own recommendation (2048M) to
  # fit the real 4GB host — see CONFIG_VALIDATION.md #11. Monitor `docker stats`
  # during real repository-analysis jobs; if this ceiling gets hit routinely,
  # the fix is a bigger VPS, not a smaller limit.
  # ----------------------------------------------------------------------------
  cverify-ai:
    restart: unless-stopped
    environment:
      SHARED_SECRET: ${AI_SERVICE_SHARED_SECRET}
      CLIENT_ID: ${AI_SERVICE_CLIENT_ID:-cverify-core}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 900M
        reservations:
          memory: 384M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------------------------
  # Backend API — resource limits tightened for the real host.
  # ----------------------------------------------------------------------------
  cverify-core:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 700M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------------------------
  # Frontend — CONFIG_VALIDATION.md #3 fix: the build ARG must be the public
  # API domain (api.cverify.io.vn), not localhost:5247, because Next.js inlines
  # NEXT_PUBLIC_* at build time. The API lives on its own subdomain (routed by
  # deployment/nginx/cverify.conf straight to cverify-core), separate from the
  # frontend's own domain — see DOMAIN vs API_DOMAIN in .env.example.
  # CONFIG_VALIDATION.md #7 fix: bind to loopback so Nginx is the only
  # public entry point (matches how every other service in this stack is
  # already bound).
  #
  # Rebuilding this image is REQUIRED after applying this override — a runtime
  # env change alone will not update values already inlined into the built JS.
  # ----------------------------------------------------------------------------
  cverify-client:
    build:
      args:
        - NEXT_PUBLIC_API_URL=https://${API_DOMAIN}/api
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://${API_DOMAIN}/api
      # SSR (server components / route handlers) runs inside this container,
      # so it can reach cverify-core over the Docker network directly instead
      # of round-tripping through the public domain — see
      # client/src/infrastructure/http/axios-client.ts:10-11, which already
      # prefers INTERNAL_API_URL server-side but had nothing setting it.
      INTERNAL_API_URL: http://cverify-core:5000/api
    # `ports` merges as a list across compose files by default (concatenation,
    # not replacement), so without `!override` this entry ADDS to the base
    # file's public "3000:3000" mapping instead of replacing it — the client
    # would stay exposed on 0.0.0.0:3000 even with this override applied.
    ports: !override
      - "127.0.0.1:${CLIENT_PORT:-3000}:3000"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
