# ==============================================================================
# CVerify — Deploy to VPS
# ==============================================================================
# Place at .github/workflows/deploy.yml in the repository root.
#
# Repository-verified facts this pipeline is built on:
#   - client/package.json scripts are only: dev, build, start, lint — there is
#     NO `test` script, so the frontend gate here is build + lint, not tests.
#   - No CVerify.Core.Tests.csproj (or any *.Tests.csproj) exists anywhere in
#     the repo, so there is currently NO backend test suite to run. The
#     `dotnet test` step below is left as a placeholder and does not run
#     anything destructive — it is a documented gap, not invented automation.
#   - CVerify.AI/tests/ DOES contain real pytest files (test_api.py,
#     test_line2_pipeline.py, etc.), but `pytest` itself is not listed in
#     CVerify.AI/requirements.txt — this workflow installs it separately.
#     If the tests need additional fixtures/mocks not in requirements.txt,
#     this step may need adjustment; that was not verified line-by-line.
#
# Secrets required (see ENVIRONMENT_VALIDATION.md §G): VPS_HOST, VPS_USER,
# VPS_SSH_KEY, and optionally VPS_SSH_PORT. No application secret is ever
# passed through GitHub — the real .env lives only on the VPS.
# ==============================================================================
name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------------------------------------
      # Frontend
      # ---------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.3'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci --legacy-peer-deps

      - name: Lint frontend
        working-directory: client
        run: npm run lint

      - name: Build frontend
        working-directory: client
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://cverify.io.vn/api
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}

      # ---------------------------------------------------------------------
      # Backend (.NET)
      # ---------------------------------------------------------------------
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore backend dependencies
        working-directory: CVerify.Core
        run: dotnet restore CVerify.API.csproj

      - name: Build backend
        working-directory: CVerify.Core
        run: dotnet build CVerify.API.csproj -c Release --no-restore

      - name: Run backend tests
        working-directory: CVerify.Core
        # NOTE: no *.Tests.csproj exists in this repository as of this audit.
        # This step is intentionally a no-op placeholder rather than a
        # fabricated command pointing at a project that doesn't exist.
        # Once a test project is added, replace with:
        #   dotnet test <TestProject>.csproj -c Release --no-build
        run: echo "No .NET test project found in repository — skipping. See REPOSITORY_AUDIT.md."

      # ---------------------------------------------------------------------
      # AI Service (Python)
      # ---------------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: CVerify.AI/requirements.txt

      - name: Install AI service dependencies
        working-directory: CVerify.AI
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run AI service tests
        working-directory: CVerify.AI
        run: pytest tests/ -v
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CI_ANTHROPIC_API_KEY_DUMMY_OR_REAL }}
          SHARED_SECRET: ci-test-secret
          CLIENT_ID: cverify-core

      # ---------------------------------------------------------------------
      # Docker image build validation (build only — no push; the VPS builds
      # its own images locally during the deploy step below, matching how
      # docker-compose.yml is already structured with `build:` contexts
      # rather than `image:` references to a registry)
      # ---------------------------------------------------------------------
      - name: Validate Docker builds
        run: |
          docker build -t cverify-core-ci:test ./CVerify.Core
          docker build -t cverify-ai-ci:test ./CVerify.AI
          docker build -t cverify-client-ci:test \
            --build-arg NEXT_PUBLIC_API_URL=https://cverify.io.vn/api \
            --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }} \
            ./client

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -e
            cd /opt/cverify/compose
            git pull origin main
            docker compose -f docker-compose.yml -f deployment/docker-compose.prod.yml \
              --env-file .env up -d --build --remove-orphans
            docker system prune -f
            docker compose ps

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            bash /opt/cverify/scripts/health-check.sh

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: main" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deployed by: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- Target: ${{ secrets.VPS_HOST }}" >> $GITHUB_STEP_SUMMARY
