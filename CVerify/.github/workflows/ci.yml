name: CVerify Core Delivery Pipeline

on:
  push:
    branches:
      - main
      - cverify-uat
  pull_request:
    branches:
      - main
      - cverify-uat

permissions:
  contents: read

jobs:
  # ============================================================================
  # 1. FRONTEND BUILD & QUALITY GATE
  # ============================================================================
  frontend-ci:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js v20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Restore npm Dependencies
        run: npm ci --legacy-peer-deps
        working-directory: client

      - name: Run ESLint Quality Gate
        run: npm run lint
        working-directory: client

      - name: Verify Frontend Compilation
        run: npm run build
        working-directory: client

  # ============================================================================
  # 2. BACKEND BUILD & UNIT TESTS
  # ============================================================================
  backend-ci:
    name: Backend Formatting, Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET SDK 10.0
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'
          cache: false

      - name: Restore NuGet Packages
        run: dotnet restore CVerify.Core/CVerify.sln

      - name: Verify Code Formatting
        run: dotnet format CVerify.Core/CVerify.sln --verify-no-changes

      - name: Compile Backend Solution
        run: dotnet build CVerify.Core/CVerify.sln --configuration Release --no-restore

      - name: Execute Unit Tests
        run: |
          dotnet test CVerify.Core/tests/CVerify.API.UnitTests/CVerify.API.UnitTests.csproj \
            --configuration Release \
            --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory coverage-results

      - name: Upload Unit Test Coverage Results
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: dotnet-unit-coverage-report
          path: coverage-results/
          retention-days: 14

  # ============================================================================
  # 3. BACKEND INTEGRATION TESTS (Testcontainers)
  # ============================================================================
  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: backend-ci # Execute only after compilation and unit tests succeed
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET SDK 10.0
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'
          cache: false

      - name: Restore NuGet Packages
        run: dotnet restore CVerify.Core/CVerify.sln

      - name: Compile Backend Solution
        run: dotnet build CVerify.Core/CVerify.sln --configuration Release --no-restore

      - name: Execute Integration Tests (Testcontainers)
        run: |
          dotnet test CVerify.Core/tests/CVerify.API.IntegrationTests/CVerify.API.IntegrationTests.csproj \
            --configuration Release \
            --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory coverage-results

      - name: Upload Integration Coverage Results
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: dotnet-integration-coverage-report
          path: coverage-results/
          retention-days: 14

  # ============================================================================
  # 4. AI SERVICE BUILD & TESTS
  # ============================================================================
  ai-service-ci:
    name: AI Service Setup & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'CVerify.AI/requirements.txt'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tesseract-ocr tesseract-ocr-eng tesseract-ocr-vie poppler-utils

      - name: Install Pip Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r CVerify.AI/requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run AI Pytest Suite with Coverage
        run: |
          pytest CVerify.AI/tests --cov=CVerify.AI/app --cov-report=xml --cov-report=term
        env:
          PYTHONPATH: CVerify.AI
          ANTHROPIC_API_KEY: dummy-key-for-ci
          SHARED_SECRET: dummy-secret-for-ci
          BACKEND_API_URL: http://mock-backend:8080

      - name: Upload AI Coverage Artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: ai-coverage-report
          path: CVerify.AI/coverage.xml
          retention-days: 14

  # ============================================================================
  # 5. DOCKER IMAGE BUILD VALIDATION
  # ============================================================================
  docker-validation:
    name: Docker Image Build Validation
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-integration-tests, ai-service-ci] # Block execution if quality/test gates fail
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build Backend Docker Image (Dry Run)
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: ./CVerify.Core
          file: ./CVerify.Core/Dockerfile
          push: false
          tags: cverify-core:latest

      - name: Build AI Service Docker Image (Dry Run)
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: ./CVerify.AI
          file: ./CVerify.AI/Dockerfile
          push: false
          tags: cverify-ai:latest

      - name: Build Frontend Docker Image (Dry Run)
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: ./client
          file: ./client/Dockerfile
          push: false
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:5247/api
          tags: cverify-client:latest
