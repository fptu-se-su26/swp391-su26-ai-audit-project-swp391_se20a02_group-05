<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - {{ product_name }}</title>
    <!-- Modern typography integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; width: 100% !important; background-color: {{ colors.background }}; font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;">
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: {{ colors.background }}; padding: 40px 10px;">
        <tr>
            <td align="center">
                <!-- Outer Envelope -->
                <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 580px; background-color: {{ colors.surface }}; border-radius: 16px; border: 1px solid {{ colors.border }}; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);">
                    
                    <!-- Header Accent Bar (Primary Accent Color) -->
                    <tr>
                        <td height="4" style="background-color: {{ colors.accent }}; line-height: 4px; font-size: 4px;">&nbsp;</td>
                    </tr>

                    <!-- Header Content -->
                    <tr>
                        <td align="left" style="padding: 32px 40px 20px 40px;">
                            {{ include 'Components/EmailHeader.html' }}
                        </td>
                    </tr>

                    <!-- Divider -->
                    <tr>
                        <td style="padding: 0 40px;">
                            <table border="0" cellpadding="0" cellspacing="0" width="100%" style="border-top: 1px solid {{ colors.surface_tertiary }};">
                                <tr><td height="1" style="font-size: 1px; line-height: 1px;">&nbsp;</td></tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Body Content -->
                    <tr>
                        <td style="padding: 24px 40px 32px 40px; text-align: left;">
                            {{ content }}
                        </td>
                    </tr>

                    <!-- Footer Content -->
                    <tr>
                        <td align="left" style="background-color: {{ colors.surface_secondary }}; padding: 24px 40px; border-top: 1px solid {{ colors.border }};">
                            {{ include 'Components/EmailFooter.html' }}
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
