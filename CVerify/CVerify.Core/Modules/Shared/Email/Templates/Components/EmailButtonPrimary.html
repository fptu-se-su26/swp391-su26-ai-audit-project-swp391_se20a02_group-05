<table border="0" cellpadding="0" cellspacing="0" width="100%" style="margin: 32px 0;">
    <tr>
        <td align="left">
            <table border="0" cellpadding="0" cellspacing="0" style="border-collapse: separate;">
                <tr>
                    <td align="center" style="border-radius: 8px; background-color: {{ colors.accent }};">
                        <a href="{{ button_url }}" target="_blank" style="display: inline-block; padding: 12px 28px; font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600; color: {{ colors.surface }}; text-decoration: none; border-radius: 8px; border: 1px solid {{ colors.accent }}; letter-spacing: -0.2px;">{{ button_text }}</a>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
