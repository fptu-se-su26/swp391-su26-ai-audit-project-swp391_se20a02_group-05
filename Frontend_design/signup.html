<body class="bg-surface text-on-surface font-body-md min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop antialiased">
<!-- Main Container -->
<main class="w-full max-w-lg bg-surface-container-lowest border border-outline-variant rounded-xl shadow-[0_2px_4px_rgba(0,0,0,0.04)] overflow-hidden">
<!-- Header -->
<div class="px-gutter py-stack-lg border-b border-outline-variant bg-surface-gray text-center">
<h1 class="font-headline-lg text-headline-lg text-primary md:hidden"><a href="index.html">Veritas</a></h1>
<h1 class="font-headline-xl text-headline-xl text-primary hidden md:block"><a class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed tracking-tight" href="index.html">CVerify</a></h1>
<p class="font-body-md text-body-md text-secondary mt-stack-sm">Tạo hồ sơ tài năng đã được xác minh của bạn.</p>
</div>
<!-- Form Canvas -->
<div class="p-gutter space-y-stack-lg">
<div class="space-y-stack-sm">
<button onclick="window.location.href='profile-setup.html'" class="w-full flex items-center justify-center space-x-2 border border-outline-variant rounded-lg py-3 font-status-label text-status-label text-on-surface hover:bg-surface-container-low transition-colors duration-200">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path></svg>
<span class="">Tiếp tục với Google</span>
</button>
<button onclick="window.location.href='profile-setup.html'" class="w-full flex items-center justify-center space-x-2 border border-outline-variant rounded-lg py-3 font-status-label text-status-label text-on-surface hover:bg-surface-container-low transition-colors duration-200">
<svg class="w-5 h-5" fill="#0A66C2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.225 0h.003z"></path></svg>
<span class="">Tiếp tục với LinkedIn</span>
</button>

<div class="relative flex items-center">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink-0 mx-4 font-label-caps text-label-caps text-secondary">HOẶC ĐĂNG KÝ BẰNG EMAIL</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Registration Form -->
<div class="space-y-stack-sm mb-stack-lg">
<p class="font-status-label text-status-label text-on-surface text-center">Bạn muốn đăng ký với vai trò nào?</p>
<div class="flex p-1 bg-surface-container-low rounded-xl">
<button onclick="window.location.href='signup.html'" class="flex-1 py-2 text-status-label font-semibold rounded-lg bg-primary text-on-primary shadow-sm transition-all duration-200" type="button">
      Ứng viên
    </button>
<button onclick="window.location.href='singin-interprase.html'" class="flex-1 py-2 text-status-label font-semibold rounded-lg text-secondary hover:text-on-surface transition-all duration-200" type="button">
      Nhà tuyển dụng
    </button>
</div>
</div><form action="profile-setup.html" onsubmit="event.preventDefault(); window.location.href=this.action;" class="space-y-stack-md" method="POST">
<!-- Email/Phone -->
<div class="space-y-base">
<label class="font-status-label text-status-label text-on-surface" for="email">Dia chỉ Email hoặc Số điện thoại</label>
<input class="w-full border border-outline-variant rounded-lg px-3 py-2 font-body-md text-body-md text-on-surface placeholder-secondary focus:outline-none input-focus-ring transition-all duration-200" id="email" name="email" placeholder="name@company.com" type="text"/>
</div>
<!-- Full Name -->
<div class="space-y-base">
<label class="font-status-label text-status-label text-on-surface" for="fullName">Họ và Tén</label>
<input class="w-full border border-outline-variant rounded-lg px-3 py-2 font-body-md text-body-md text-on-surface placeholder-secondary focus:outline-none input-focus-ring transition-all duration-200" id="fullName" name="fullName" placeholder="Jane Doe" type="text"/>
</div>
<!-- Grid for Optional Fields -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<div class="space-y-base">
<label class="font-status-label text-status-label text-on-surface flex justify-between" for="jobTitle">Chức danh <span class="text-secondary font-normal">Tùy chọn</span></label>
<input class="w-full border border-outline-variant rounded-lg px-3 py-2 font-body-md text-body-md text-on-surface placeholder-secondary focus:outline-none input-focus-ring transition-all duration-200" id="jobTitle" name="jobTitle" placeholder="Ví dụ: Kỹ sư cao cấp" type="text"/>
</div>
<div class="space-y-base">
<label class="font-status-label text-status-label text-on-surface flex justify-between" for="experience">Kinh nghiệm <span class="text-secondary font-normal">Tùy chọn</span></label>
<select class="w-full border border-outline-variant rounded-lg px-3 py-2 font-body-md text-body-md text-on-surface bg-surface-container-lowest focus:outline-none input-focus-ring transition-all duration-200" id="experience" name="experience">
<option disabled="" selected="" value="">Chọn số năm</option>
<option value="0-2">0-2 năm</option>
<option value="3-5">3-5 năm</option>
<option value="5-10">5-10 năm</option>
<option value="10+">Trén 10 năm</option>
</select>
</div>
</div>
<!-- Country/Timezone -->
<div class="space-y-base">
<label class="font-status-label text-status-label text-on-surface" for="location">Quốc gia / Múi giờ</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-secondary text-lg">public</span>
</span>
<select class="w-full border border-outline-variant rounded-lg pl-10 pr-3 py-2 font-body-md text-body-md text-on-surface bg-surface-container-lowest focus:outline-none input-focus-ring transition-all duration-200 appearance-none" id="location" name="location">
<option value="us-et">Hoa Kỳ (EST)</option>
<option value="us-pt">Hoa Kỳ (PST)</option>
<option value="uk-gmt">Vương quốc Anh (GMT)</option>
<option value="eu-cet">Châu Âu (CET)</option>
<option value="other">Khác...</option>
</select>
</div>
</div>
<!-- Password -->
<div class="space-y-base">
<label class="font-status-label text-status-label text-on-surface" for="password">Mật khẩu</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-secondary text-lg">lock</span>
</span>
<input class="w-full border border-outline-variant rounded-lg pl-10 pr-10 py-2 font-body-md text-body-md text-on-surface placeholder-secondary focus:outline-none input-focus-ring transition-all duration-200" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-secondary hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-lg">Tiếp tục với Google</span>
</button>
</div>
</div>
<!-- Terms & Privacy Checkbox -->
<div class="flex items-start mt-stack-md">
<div class="flex items-center h-5">
<input class="w-4 h-4 text-primary bg-surface-container-lowest border-outline-variant rounded focus:ring-primary focus:ring-2 focus:ring-offset-2 focus:ring-offset-surface-container-lowest cursor-pointer transition-all duration-200" id="terms" name="terms" type="checkbox"/>
</div>
<div class="ml-3 text-sm">
<label class="font-body-sm text-body-sm text-secondary" for="terms">Tôi đồng ý vối <a class="text-primary hover:underline font-semibold" href="#">Điều khoản dịch vụ</a> và <a class="text-primary hover:underline font-semibold" href="#">Chính sách bảo mật</a> của Veritas.</label>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-status-label text-status-label rounded-lg py-3 px-4 hover:bg-surface-tint shadow-[0_4px_6px_-1px_rgba(0,110,46,0.2)] hover:shadow-[0_6px_8px_-1px_rgba(0,110,46,0.3)] transform transition-all duration-200 hover:-translate-y-0.5 mt-stack-lg" type="submit">Tạo tài khoản</button>
</form>
</div>
<!-- Footer / Login Link -->
<div class="px-gutter py-4 border-t border-outline-variant bg-surface-gray text-center">
<p class="font-body-sm text-body-sm text-secondary">Bạn đã có tài khoản? <a class="text-primary font-semibold hover:underline" href="login.html">Đăng nhập tại đây</a></p>
</div>
</main>
