name: Deploy Frontend Design to GitHub Pages

on:
  push:
    branches:
      - Frontend_Demo

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Thư mục chứa file html của bạn, nếu đã lôi ra ngoài root thì để '.'
          # Còn nếu vẫn để trong Frontend_design thì sửa lại thành 'Frontend_design' nhé
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4