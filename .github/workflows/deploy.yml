name: Deploy static content to Pages

on:
  push:
    branches: ["frontend_test"] # Kích hoạt khi có code mới tại nhánh này

  # Cho phép kích hoạt chạy bằng tay từ tab Actions
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập cấu hình GitHub Pages
        uses: actions/configure-pages@v5

      - name: Đóng gói tài nguyên tĩnh
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Chọn thư mục gốc (nơi chứa index.html)

      - name: Triển khai lên hạ tầng GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4